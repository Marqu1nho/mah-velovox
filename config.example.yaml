# readaloud configuration — ~/.config/readaloud/config.yaml

engine: say                 # say | kokoro

# Control model: the toggle hotkey = start / pause / resume (it never stops).
# Click the top-center transport pill to STOP a read.
hotkeys:
  toggle: ["ctrl", "alt", "cmd", "S"]   # start / pause / resume (map your mouse button to this)
  read_window: ["ctrl", "alt", "cmd", "W"]   # same start / pause / resume, for window reads
  show_alerts: true

voice:
  say_voice: system         # system = macOS Spoken Content voice (Siri loophole) | a named voice e.g. "Zoe (Premium)"
  base_wpm: 240             # say engine speaking rate (words per minute)
  kokoro_voice: af_heart
  speed: 1.1                # kokoro engine: 1.0 = natural

alerts:
  y_pct: 3.5                # status pill vertical center, % of screen height (0 = top)
  duration_s: 1.2           # how long the pill stays up

headers:
  rate_factor: 0.85         # headers read slower
  pause_before_ms: 500
  pause_after_ms: 400
  treat_all_caps_lines_as_headers: true

pauses:
  paragraph_ms: 350
  list_item_ms: 200
  horizontal_rule_ms: 600

code_blocks:
  mode: skip                # skip | read | silent-skip
  announce_template: "code block, {lines} lines"

clean:
  rejoin: smart             # smart | always | never  (terminal hard-wrap repair)
  urls: domain              # domain | full | skip
  paths: basename           # basename | full | skip
  emoji: skip               # skip | name

window_read:
  max_chars: 20000

limits:
  max_selection_chars: 60000   # guard against accidental ⌘A reads

# mute: per-app ignore lists for captured text. Rules are case-sensitive and
# apply to both selection and window reads.
#   plain string      -> excised wherever it appears in a line
#   re:<regex>        -> Python regex, excised (per line; ^ $ anchor to a line)
#   drop-line:<str>   -> if the line contains <str>, drop the whole line
#   drop-line:re:<rx> -> drop the whole line if the regex matches it
# `blocks` drop a whole multi-line group: a start match removes that line and
# every following line UNTIL the next blank line (the blank is preserved). Use
# it for marker-less continuation/body lines a per-line rule can't catch.
#   plain string / re:<rx>  -> matches a group's START line (no drop-line: here)
# App names are the frontmost app at capture time (see the `app=` field in
# ~/.local/state/readaloud/hammerspoon.log).
mute:
  global: []
  by_app: {}
  blocks: []
  # Example -- uncomment / adapt to taste:
  # global:
  #   - "drop-line:↓ to manage · ctrl+o to expand"
  # blocks:                  # drop a whole group: start match -> until next blank line
  #   - "re:^⏺ \\w+\\("       # a Claude Code tool call + its ⎿ result body
  # by_app:
  #   Code:
  #     - "drop-line:re:^\\s*[⏺⎿]"        # Claude Code tool-call / result lines
  #     - "drop-line:↓ to manage · ctrl+o to expand"
  #   Arc:
  #     - "Skip to content"
